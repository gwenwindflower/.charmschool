[changelog]
header = """
# Changelog\n
All notable changes to this project will be documented in this file.\n
"""
body = """
{% if version %}\
    ## {{ version | trim_start_matches(pat="v") }} - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## Unreleased
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for group, commits in commits | group_by(attribute="scope") %}
        #### {{ group | upper_first }}
        {% for commit in commits %}
              * {{ commit.message | split(pat="\n") | first | trim }}\
                {% if commit.remote.username %} by @{{ commit.remote.username }}{%- endif %}\
                {% if commit.remote.pr_number %} in #{{ commit.remote.pr_number }}{%- endif %}
        {% endfor %}
    {% endfor %}\
{% endfor %}\n
"""
footer = """
<!-- generated by git-cliff -->
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
require_conventional = true
split_commits = false
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->✨ Features" },
  { message = "^fix", group = "<!-- 1 -->🐛 Bug Fixes" },
  { message = "^perf", group = "<!-- 2 -->🏎️ Performance" },
  { message = "^refactor", group = "<!-- 3 -->♻️ Refactor" },
  { message = "^test", group = "<!-- 5 -->🧪 Testing" },
  { message = "^agent", group = "<!-- 6 -->🤖 Coding Agents" },
  { message = "^doc", group = "<!-- 7 -->📚 Documentation", default_scope = "unscoped" },
  { message = "^build", group = "<!-- 8 -->🛠️ Build System" },
  { message = "^ci", group = "<!-- 9 -->🚧 CI/CD" },
  { message = "^style", group = "<!-- 10 -->🎨 Style & Formatting" },
  { message = "^chore\\(release\\): prepare for", skip = true },
  { message = "^chore", group = "<!-- 11 -->🧰 Tooling & Tasks" },
  { body = ".*security", group = "<!-- 4 -->🛡️ Security" },
]
filter_commits = false
topo_order = false
sort_commits = "oldest"

[bump]
breaking_always_bump_major = false
