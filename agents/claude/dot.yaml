installs: |
  if type -q claude
    echo "Claude Code is already installed!"
  else
    brew install claude-code
  end

links:
  settings.json: ~/.claude/settings.json
  keybindings.json: ~/.claude/keybindings.json
  statusline.toml: ~/.claude/statusline.toml
  claude.fish: ~/.config/fish/completions/claude.fish
  ../shared/agents/: ~/.claude/agents/
  ../shared/skills/: ~/.claude/skills/
  ../shared/rules/: ~/.claude/rules/
