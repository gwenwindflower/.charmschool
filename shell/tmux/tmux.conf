# new_tmux.conf — Catppuccin Frappe flat-color aesthetic tmux config
# Inspired by naivecynics/primary-tmux, adapted for solid backgrounds
# and integration with LazyVim + vim-tmux-navigator.

# ── Terminal & Core ──────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-kitty:RGB"
set -s extended-keys on
set -as terminal-features 'xterm-kitty:extkeys'
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -s escape-time 0
set -g repeat-time 750
set -g allow-passthrough on
setw -g monitor-activity on

# ── Catppuccin Frappe Color Palette ──────────────────────────────────
# Defining colors as tmux user variables for easy reference throughout.
# These are the official Catppuccin Frappe values.
set -g @thm_rosewater "#f2d5cf"
set -g @thm_flamingo "#eebebe"
set -g @thm_pink "#f4b8e4"
set -g @thm_mauve "#ca9ee6"
set -g @thm_red "#e78284"
set -g @thm_maroon "#ea999c"
set -g @thm_peach "#ef9f76"
set -g @thm_yellow "#e5c890"
set -g @thm_green "#a6d189"
set -g @thm_teal "#81c8be"
set -g @thm_sky "#99d1db"
set -g @thm_sapphire "#85c1dc"
set -g @thm_blue "#8caaee"
set -g @thm_lavender "#babbf1"
set -g @thm_text "#c6d0f5"
set -g @thm_subtext1 "#b5bfe2"
set -g @thm_subtext0 "#a5adce"
set -g @thm_overlay2 "#949cbb"
set -g @thm_overlay1 "#838ba7"
set -g @thm_overlay0 "#737994"
set -g @thm_surface2 "#626880"
set -g @thm_surface1 "#51576d"
set -g @thm_surface0 "#414559"
set -g @thm_base "#303446"
set -g @thm_mantle "#292c3c"
set -g @thm_crust "#232634"

# ── Prefix ───────────────────────────────────────────────────────────
# Keeping C-f from current config (ergonomic, doesn't clash with vim)
unbind C-b
set -g prefix C-f
bind C-f send-prefix

# ── Config Reload ────────────────────────────────────────────────────
bind r source-file "$HOME/.config/tmux/tmux.conf" \; display-message "Config reloaded"

# ── Pane Navigation (vim-tmux-navigator handles C-hjkl) ─────────────
# Raw hjkl for when navigator isn't active (prefix + hjkl)
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# Pane resizing (prefix + ctrl-hjkl)
bind -r C-Up resizep -U 4
bind -r C-Down resizep -D 4
bind -r C-Left resizep -L 8
bind -r C-Right resizep -R 8

# ── Splits & Windows ────────────────────────────────────────────────
bind C-v split-window -h -c "#{pane_current_path}"
bind C-s split-window -v -c "#{pane_current_path}"
bind n new-window -c "#{pane_current_path}"
bind d kill-pane
bind X kill-window
bind C-q detach
bind ` last-window
# Window cycling
bind -n C-M-h previous-window
bind -n C-M-l next-window

# ── Copy Mode (vi) ──────────────────────────────────────────────────
# Vim-consistent: v to enter, v to select, y to yank, p to paste
set -s copy-command 'fish_clipboard_copy'
setw -g mode-keys vi
unbind [
unbind ]
bind v copy-mode
bind p paste-buffer
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ── Status Bar: General ─────────────────────────────────────────────
# Top status bar — base background for a seamless feel
set -g status-position top
set -g status-style "bg=#{@thm_base}"
set -g status-justify "absolute-centre"

# ── Status Bar: Left ────────────────────────────────────────────────
# Session name (highlights on prefix), separator, command, separator, path, zoom indicator
# Command display uses @hint_cmd (via tmux_hint) when set, else pane_current_command
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_crust},bold]  #S },#{#[bg=#{@thm_base},fg=#{@thm_red},bold]  #S }}"
set -ga status-left "#[bg=#{@thm_base},fg=#{@thm_overlay0},none]│"
set -ga status-left "#[bg=#{@thm_base},fg=#{@thm_green},bold] #{?#{@hint_cmd},#{@hint_cmd},#{pane_current_command}} "
set -ga status-left "#[bg=#{@thm_base},fg=#{@thm_overlay0},none]│"
set -ga status-left "#[bg=#{@thm_base},fg=#{@thm_blue},bold] #{=/-10/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=#{@thm_base},fg=#{@thm_overlay0}]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=#{@thm_base},fg=#{@thm_yellow},bold]#{?window_zoomed_flag,  zoom ,}"

# ── Status Bar: Right ───────────────────────────────────────────────
# CPU, RAM, battery — each color-coded with separators
set -g status-right-length 100
set -g status-right ""
set -ga status-right "#[bg=#{@thm_base},fg=#{@thm_blue},bold]  #{cpu_percentage} "
set -ga status-right "#[bg=#{@thm_base},fg=#{@thm_overlay0},none]│"
set -ga status-right "#[bg=#{@thm_base},fg=#{@thm_green},bold] 󰍛 #{ram_percentage} "
set -ga status-right "#[bg=#{@thm_base},fg=#{@thm_overlay0},none]│"
set -ga status-right "#{?#{e|>=:20,#{battery_percentage}},#{#[bg=#{@thm_red},fg=#{@thm_crust},bold]},#{#[bg=#{@thm_base},fg=#{@thm_red},bold]}} 󱐋 #{battery_percentage} "

# ── Window Status: Nerd Font Icons ──────────────────────────────────
# Icon-only window tabs in the center — current window gets peach highlight.
# Icons are resolved by pane-icon.sh (POSIX sh case statement) to avoid
# maintaining two identical nested conditionals in tmux format strings.
# The script also reads @hint_cmd (set by tmux_hint in Fish) — when a wrapper
# or pager pipeline obscures the real command, @hint_cmd takes priority.
set -g automatic-rename off
set -g allow-rename off

# Inactive windows: subtle rosewater icons
set -g window-status-format "#($HOME/.config/tmux/pane-icon.sh #{pane_current_command} #{@hint_cmd})"

# Active window: same icons, bold peach styling
set -g window-status-current-format "#($HOME/.config/tmux/pane-icon.sh #{pane_current_command} #{@hint_cmd})"

# Window status colors — nice gradient from subtle to bold
set -g window-status-style "bg=#{@thm_base},fg=#{@thm_rosewater}"
set -g window-status-last-style "bg=#{@thm_base},fg=#{@thm_flamingo}"
set -g window-status-current-style "bg=#{@thm_base},fg=#{@thm_peach},bold"
set -g window-status-activity-style "bg=#{@thm_base},fg=#{@thm_pink},bold"
set -g window-status-bell-style "bg=#{@thm_base},fg=#{@thm_red},bold"

# ── Pane Borders ────────────────────────────────────────────────────
# Minimal single-line borders, active pane gets a pop of color
setw -g pane-border-status off
setw -g pane-border-format ""
setw -g pane-border-style "bg=default,fg=#{@thm_surface1}"
setw -g pane-active-border-style "bg=default,fg=#{@thm_mauve}"
setw -g pane-border-lines single

# ── Message & Mode Styling ──────────────────────────────────────────
set -g message-style "bg=#{@thm_base},fg=#{@thm_text}"
set -g message-command-style "bg=#{@thm_base},fg=#{@thm_text}"
set -g mode-style "bg=#{@thm_surface1},fg=#{@thm_text}"

# ── Clock ────────────────────────────────────────────────────────────
# clock-mode-colour doesn't support format interpolation, needs literal hex
setw -g clock-mode-colour "#8caaee"

# ── Plugins ─────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'christoomey/vim-tmux-navigator'

# ── TPM Init (must be last) ─────────────────────────────────────────
run "$HOME/.config/tmux/plugins/tpm/tpm"
