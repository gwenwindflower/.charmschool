# ── Terminal & Core ──────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -s extended-keys on
# Server options: use set -s, not set -g
# First reset defaults so in-session reload doesn't stack up append options
set -su terminal-features
# -a appends to the defaults we reset to
# index 0 is `xterm-*` which includes `xterm-kitty` (our choice of terminal emulator)
set -sa terminal-features[0] ":extkeys:mouse:RGB:sync:hyperlinks:bpaste:usstyle:strikethrough"
#
# You could also set this specifically for xterm-kitty like this
# set -sa terminal-features ",xterm-kitty:extkeys:mouse:RGB:sync:hyperlinks:bpaste:usstyle:strikethrough"
#
# You can check the client terminal
# and the features that modern tmux auto-detects
# with these commands
# display -p '#{client_termname}'
# display -p '#{client_termfeatures}'
#
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -s escape-time 0
set -g repeat-time 750
set -g allow-passthrough on
setw -g monitor-activity on
set -g activity-action none

# ── Catppuccin Frappe Color Palette ──────────────────────────────────
# Defining colors as tmux user variables for easy reference throughout.
# These are the official Catppuccin Frappe values.
set -g @thm_rosewater "#f2d5cf"
set -g @thm_flamingo "#eebebe"
set -g @thm_pink "#f4b8e4"
set -g @thm_mauve "#ca9ee6"
set -g @thm_red "#e78284"
set -g @thm_maroon "#ea999c"
set -g @thm_peach "#ef9f76"
set -g @thm_yellow "#e5c890"
set -g @thm_green "#a6d189"
set -g @thm_teal "#81c8be"
set -g @thm_sky "#99d1db"
set -g @thm_sapphire "#85c1dc"
set -g @thm_blue "#8caaee"
set -g @thm_lavender "#babbf1"
set -g @thm_text "#c6d0f5"
set -g @thm_subtext1 "#b5bfe2"
set -g @thm_subtext0 "#a5adce"
set -g @thm_overlay2 "#949cbb"
set -g @thm_overlay1 "#838ba7"
set -g @thm_overlay0 "#737994"
set -g @thm_surface2 "#626880"
set -g @thm_surface1 "#51576d"
set -g @thm_surface0 "#414559"
set -g @thm_base "#303446"
set -g @thm_mantle "#292c3c"
set -g @thm_crust "#232634"

# ── Prefix ───────────────────────────────────────────────────────────
# Keeping C-f from current config (ergonomic, doesn't clash with vim)
unbind C-b
set -g prefix C-f
bind C-f send-prefix


# ── Session Management ────────────────────────────────────────────────────
# Reload config without restarting
bind r source-file "$HOME/.config/tmux/tmux.conf" \; display-message "Config reloaded...have a nice session! <3"
# Detach from session immediately
bind -r C-q detach

# ── Pane Navigation (vim-tmux-navigator handles C-hjkl) ─────────────
# Raw hjkl for when navigator isn't active (prefix + hjkl)
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# Pane resizing (prefix + ctrl-hjkl)
bind -r C-Up resizep -U 4
bind -r C-Down resizep -D 4
bind -r C-Left resizep -L 8
bind -r C-Right resizep -R 8

# ── Splits & Windows ────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind n new-window -c "#{pane_current_path}"
bind d kill-pane
bind X kill-window
bind ` last-window
# Windows
bind -n C-M-h previous-window
bind -n C-M-l next-window
bind-key -n M-< swap-window -t -1\; select-window -t -1
bind-key -n M-> swap-window -t +1\; select-window -t +1

# ── Copy Mode (vi) ──────────────────────────────────────────────────
# Vim-consistent: v to enter, v to select, y to yank, p to paste
set -s copy-command 'fish_clipboard_copy'
setw -g mode-keys vi
unbind [
unbind ]
bind v copy-mode
bind p paste-buffer
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ── Shell Commands ────────────────────────────────────────────────
bind-key a new-window \; send-keys "claude" Enter
bind-key A run-shell "fish -c 'tmux_hint ai'"
bind-key C-c new-window \; send-keys "ee -e ~/.charmschool" Enter

# ── Status Bar ────────────────────────────────────────────────────
# Our status bar has a lot of goodies and polish,
# to keep it from bogging down the system we have a long refresh interval
set -g status-interval 10
source-file ~/.config/tmux/statusline.conf

# ── Pane Borders ────────────────────────────────────────────────────
# Minimal single-line borders, active pane gets a pop of color
setw -g pane-border-status off
setw -g pane-border-format ""
setw -g pane-border-style "bg=default,fg=#{@thm_surface1}"
setw -g pane-active-border-style "bg=default,fg=#{@thm_mauve}"
setw -g pane-border-lines single

# ── Message & Mode Styling ──────────────────────────────────────────
set -g message-style "bg=#{@thm_base},fg=#{@thm_text}"
set -g message-command-style "bg=#{@thm_base},fg=#{@thm_text}"
set -g mode-style "bg=#{@thm_surface1},fg=#{@thm_text}"

# ── Clock ────────────────────────────────────────────────────────────
# clock-mode-colour doesn't support format interpolation, needs literal hex
setw -g clock-mode-colour "#8caaee"

# ── Plugins ─────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'christoomey/vim-tmux-navigator'

# ── TPM Init (must be last) ─────────────────────────────────────────
run "$TMUX_PLUGIN_MANAGER_INSTALL/tpm"
