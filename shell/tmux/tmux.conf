# Window status colors вҖ” nice gradient from subtle to bold
set -g window-status-style "bg=#{@thm_base},fg=#{@thm_rosewater}"
set -g window-status-last-style "bg=#{@thm_base},fg=#{@thm_flamingo}"
set -g window-status-current-style "bg=#{@thm_base},fg=#{@thm_peach},bold"
set -g window-status-activity-style "bg=#{@thm_base},fg=#{@thm_pink},bold"
set -g window-status-bell-style "bg=#{@thm_base},fg=#{@thm_red},bold"

# в”Җв”Җ Pane Borders в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Minimal single-line borders, active pane gets a pop of color
setw -g pane-border-status off
setw -g pane-border-format ""
setw -g pane-border-style "bg=default,fg=#{@thm_surface1}"
setw -g pane-active-border-style "bg=default,fg=#{@thm_mauve}"
setw -g pane-border-lines single

# в”Җв”Җ Message & Mode Styling в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
set -g message-style "bg=#{@thm_base},fg=#{@thm_text}"
set -g message-command-style "bg=#{@thm_base},fg=#{@thm_text}"
set -g mode-style "bg=#{@thm_surface1},fg=#{@thm_text}"

# в”Җв”Җ Clock в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# clock-mode-colour doesn't support format interpolation, needs literal hex
setw -g clock-mode-colour "#8caaee"

