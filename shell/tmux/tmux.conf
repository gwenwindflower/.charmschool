# new_tmux.conf вҖ” Catppuccin Frappe flat-color aesthetic tmux config
# Inspired by naivecynics/primary-tmux, adapted for solid backgrounds
# and integration with LazyVim + vim-tmux-navigator.

# в”Җв”Җ Terminal & Core в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-kitty:RGB"
set -s extended-keys on
set -as terminal-features 'xterm-kitty:extkeys'
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -s escape-time 0
set -g repeat-time 300
set -g allow-passthrough on
setw -g monitor-activity on

# в”Җв”Җ Catppuccin Frappe Color Palette в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Defining colors as tmux user variables for easy reference throughout.
# These are the official Catppuccin Frappe values.
set -g @thm_rosewater "#f2d5cf"
set -g @thm_flamingo "#eebebe"
set -g @thm_pink "#f4b8e4"
set -g @thm_mauve "#ca9ee6"
set -g @thm_red "#e78284"
set -g @thm_maroon "#ea999c"
set -g @thm_peach "#ef9f76"
set -g @thm_yellow "#e5c890"
set -g @thm_green "#a6d189"
set -g @thm_teal "#81c8be"
set -g @thm_sky "#99d1db"
set -g @thm_sapphire "#85c1dc"
set -g @thm_blue "#8caaee"
set -g @thm_lavender "#babbf1"
set -g @thm_text "#c6d0f5"
set -g @thm_subtext1 "#b5bfe2"
set -g @thm_subtext0 "#a5adce"
set -g @thm_overlay2 "#949cbb"
set -g @thm_overlay1 "#838ba7"
set -g @thm_overlay0 "#737994"
set -g @thm_surface2 "#626880"
set -g @thm_surface1 "#51576d"
set -g @thm_surface0 "#414559"
set -g @thm_base "#303446"
set -g @thm_mantle "#292c3c"
set -g @thm_crust "#232634"

# в”Җв”Җ Prefix в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Keeping C-f from current config (ergonomic, doesn't clash with vim)
unbind C-b
set -g prefix C-f
bind C-f send-prefix

# в”Җв”Җ Config Reload в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
bind r source-file "$HOME/.config/tmux/tmux.conf" \; display-message "Config reloaded"

# в”Җв”Җ Pane Navigation (vim-tmux-navigator handles C-hjkl) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Raw hjkl for when navigator isn't active (prefix + hjkl)
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# Pane resizing (prefix + ctrl-hjkl)
bind -r ^k resizep -U 4
bind -r ^j resizep -D 4
bind -r ^h resizep -L 8
bind -r ^l resizep -R 8

# в”Җв”Җ Splits & Windows в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
bind C-v split-window -h -c "#{pane_current_path}"
bind C-s split-window -v -c "#{pane_current_path}"
bind n new-window -c "#{pane_current_path}"
bind d kill-pane
bind X kill-window
bind C-q detach
bind ` last-window
# Window cycling вҖ” Alt-Shift-[ / ] (no prefix needed)
# Shifted brackets avoid CSI escape conflicts that plague bare M-[
bind -n M-'{' previous-window
bind -n M-'}' next-window

# в”Җв”Җ Copy Mode (vi) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Vim-consistent: v to enter, v to select, y to yank, p to paste
set -s copy-command 'fish_clipboard_copy'
setw -g mode-keys vi
unbind [
unbind ]
bind v copy-mode
bind p paste-buffer
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# в”Җв”Җ Status Bar: General в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Top status bar вҖ” base background for a seamless feel
set -g status-position top
set -g status-style "bg=#{@thm_base}"
set -g status-justify "absolute-centre"

# в”Җв”Җ Status Bar: Left в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Session name (highlights on prefix), separator, command, separator, path, zoom indicator
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_crust},bold]  #S },#{#[bg=#{@thm_base},fg=#{@thm_red},bold]  #S }}"
set -ga status-left "#[bg=#{@thm_base},fg=#{@thm_overlay0},none]в”Ӯ"
set -ga status-left "#[bg=#{@thm_base},fg=#{@thm_green},bold]  #{pane_current_command} "
set -ga status-left "#[bg=#{@thm_base},fg=#{@thm_overlay0},none]в”Ӯ"
set -ga status-left "#[bg=#{@thm_base},fg=#{@thm_blue},bold]  #{=/-10/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=#{@thm_base},fg=#{@thm_overlay0}]#{?window_zoomed_flag,в”Ӯ,}"
set -ga status-left "#[bg=#{@thm_base},fg=#{@thm_yellow},bold]#{?window_zoomed_flag,  zoom ,}"

# в”Җв”Җ Status Bar: Right в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# CPU, RAM, battery вҖ” each color-coded with separators
set -g status-right-length 100
set -g status-right ""
set -ga status-right "#[bg=#{@thm_base},fg=#{@thm_blue},bold]  #{cpu_percentage} "
set -ga status-right "#[bg=#{@thm_base},fg=#{@thm_overlay0},none]в”Ӯ"
set -ga status-right "#[bg=#{@thm_base},fg=#{@thm_green},bold] у°Қӣ #{ram_percentage} "
set -ga status-right "#[bg=#{@thm_base},fg=#{@thm_overlay0},none]в”Ӯ"
set -ga status-right "#{?#{e|>=:20,#{battery_percentage}},#{#[bg=#{@thm_red},fg=#{@thm_crust},bold]},#{#[bg=#{@thm_base},fg=#{@thm_red},bold]}} уұҗӢ #{battery_percentage} "

# в”Җв”Җ Window Status: Nerd Font Icons в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
