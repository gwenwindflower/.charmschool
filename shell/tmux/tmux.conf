# Shells ............ zsh, fish, bash
# Dev tools ......... nvim, git, lazygit, man, make, docker
# Python ............ python, ipython, marimo, jupyter
# JS/TS/Rust ........ node, deno, cargo, go
# Ruby .............. ruby, irb, pry, rails
# Lua ............... lua, luajit
# Data / DB ......... pgcli, duckdb, sqlite3, dbt
