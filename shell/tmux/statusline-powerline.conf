# ── General ─────────────────────────────────────────────────────────────────
# Top status bar — base background for a seamless feel
set -g status-position top
set -g status-style "bg=#{@thm_base}"
set -g status-justify "absolute-centre"

# ── Left section: window/session info ────────────────────────────────────────
# Powerline style: [session pill]  command  path [zoom]
#
# IMPORTANT: Style tags inside #{?} conditionals must use the #{#[...] text }
# wrapper pattern. Bare #[bg=...,fg=...,bold] inside #{?...,...,...} causes
# the commas to be parsed as conditional separators, breaking the format string.
# This is why the original statusline.conf uses #{#[...] content } everywhere.
set -g status-left-length 100
set -g status-left ""
# Session name pill — #{#[...] content } protects the commas in the style tag
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_crust},bold]  #S },#{#[bg=#{@thm_surface0},fg=#{@thm_red},bold]  #S }}"
# Powerline exit arrow ( U+E0B0): fg = pill color, bg = bar base
# Colors are set by the conditional, the glyph character follows on the next line
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_base},fg=#{@thm_red}]},#{#[bg=#{@thm_base},fg=#{@thm_surface0}]}}"
set -ga status-left ""
# Command
set -ga status-left "#[bg=#{@thm_base},fg=#{@thm_green},bold] #{?#{@hint_cmd},#{@hint_cmd},#{pane_current_command}} "
# Thin separator ( U+E0B1)
set -ga status-left "#[bg=#{@thm_base},fg=#{@thm_overlay0}]"
# Path
set -ga status-left "#[bg=#{@thm_base},fg=#{@thm_blue},bold] #{=/-10/...:#{s|$USER|~|:#{b:pane_current_path}}} "
# Zoom — thin separator then label, both conditional
set -ga status-left "#[bg=#{@thm_base},fg=#{@thm_overlay0}]#{?window_zoomed_flag,,}"
set -ga status-left "#[bg=#{@thm_base},fg=#{@thm_yellow},bold]#{?window_zoomed_flag,  zoom ,}"

# ── Right section: machine info ───────────────────────────────────────────────
# Powerline style: CPU  RAM  [battery pill]
#
# Battery pill only activates when critical (≤ 20%): filled  arrow + red bg.
# Normal battery: thin  separator, plain red text on bar bg.
set -g status-right-length 100
set -g status-right ""
# CPU
set -ga status-right "#[bg=#{@thm_base},fg=#{@thm_blue},bold]  #{cpu_percentage} "
# Thin separator ( U+E0B3)
set -ga status-right "#[bg=#{@thm_base},fg=#{@thm_overlay0}]"
# RAM
set -ga status-right "#[bg=#{@thm_base},fg=#{@thm_green},bold] 󰍛 #{ram_percentage} "
# Battery entry arrow: set color conditionally, then pick glyph conditionally
#   critical (≤ 20%):  filled in thm_red on thm_base bg → enters red pill
#   normal (> 20%):    in thm_overlay0 on thm_base bg → separator feel
set -ga status-right "#{?#{e|>=:20,#{battery_percentage}},#{#[bg=#{@thm_red},fg=#{@thm_base}]},#{#[bg=#{@thm_base},fg=#{@thm_overlay0}]}}"
set -ga status-right "#{?#{e|>=:20,#{battery_percentage}},,}"
# Battery content — style applied by conditional, text follows outside it (same pattern as original)
set -ga status-right "#{?#{e|>=:20,#{battery_percentage}},#{#[bg=#{@thm_red},fg=#{@thm_crust},bold]},#{#[bg=#{@thm_base},fg=#{@thm_red},bold]}} 󱐋 #{battery_percentage} "

# ── Center section: icon-based window names ──────────────────────────────────
# Icons are resolved by pane-icon.sh (POSIX sh case statement)
# This sets the options @assigned_icon (literal override) and @hint_cmd (command name override)
# via the `tmux_hint` functions in fish
## Don't override our custom settings
set -g automatic-rename off
set -g allow-rename off
## window status content logic
set -g window-status-format "#($HOME/.config/tmux/pane-icon.sh #{pane_current_command} #{?@hint_cmd,#{@hint_cmd},none} #{?@assigned_icon,#{@assigned_icon},none})"
set -g window-status-current-format "#($HOME/.config/tmux/pane-icon.sh #{pane_current_command} #{?@hint_cmd,#{@hint_cmd},none} #{?@assigned_icon,#{@assigned_icon},none})"
## window status colors
set -g window-status-style "bg=#{@thm_base},fg=#{@thm_overlay0}"
set -g window-status-last-style "bg=#{@thm_base},fg=#{@thm_rosewater}"
set -g window-status-current-style "bg=#{@thm_base},fg=#{@thm_peach}"
set -g window-status-activity-style "bg=#{@thm_base},fg=#{@thm_lavender}"
set -g window-status-bell-style "bg=#{@thm_base},fg=#{@thm_lavender},blink"
