installs: |
  if type -q tmux
    echo "tmux is already installed!"
    if test -d $TMUX_PLUGIN_MANAGER_INSTALL
      echo "tpm is already installed!"
    else
      brew install tpm
    end
    return 0
  else
    brew install tmux
    brew install tpm
  end

links:
  tmux.conf: ~/.config/tmux/tmux.conf
  statusline.conf: ~/.config/tmux/statusline.conf
  statusline-powerline.conf: ~/.config/tmux/statusline-powerline.conf
  pane-icon.sh: ~/.config/tmux/pane-icon.sh
